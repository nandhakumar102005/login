<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trandy chaps login page</title>
    <style>
        *{
            margin: 0%;
            padding: 0%
        }
        body{
            
            background-image: url(background\ image.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        
        .contact-section{
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .contact-container{
            /* border: 1;
            border-color: rgb(20, 20, 20);
            border-style: solid; */
            border-radius: 10px;
            /* background-color: whitesmoke; */
            background: transparent;
            backdrop-filter: blur(5px);
            box-shadow: 10px 10px 10px 10px;
            width: 100%;
            max-width: 600px; 
            padding: 40px;
            transition: transform ;
            transition-duration: 1.1s;
            transition-timing-function: ease;

        }

        .contact-container:hover{
            transform: scale(1.1)
        }



        .contact-container h1{
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-weight: 700;
        }
        .contact-container p{
            text-align: center;
            margin-bottom: 30px;
            /* color: brown; */
            color: white;
            font-weight: 700;
        }
        .form-group{
            margin-bottom: 20px;

        }
        .form-group label{
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: white;
        }
        .form-group input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 10px;
            background-color: rgb(248, 248, 248);


        }

        .form-group input:focus{
            outline: none;
        }

         .form-group input::placeholder{
            color: black;
            font-weight: bold;
         }
         
        .btn{
            width: 100%;
            padding: 12px;
            background-color:white;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        a{
            text-decoration: none;
            margin-left: 3px;
            justify-content: center;
            color: black;
        }
        
        .last{
            margin-top: 20px;
        }
        .button{
            display: inline-block;
            padding: 10px 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 5px;
           
        }
        .button-wrapper{
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
            
        }button:hover{
            cursor: pointer;
            background-color: black;
            color: antiquewhite;
            transition: all 0.8s ease ease-in-out;
                font-weight: 700;
        }
        button{
             background-color: white;
             color: black;
             padding: 5px;
             border: none;
             border-radius: 5px;
        }

        .last {
            display: flex;
           
            justify-content: center;
            
            text-align: center;
        }

        .last a{
            text-align: center;
            align-items: center;
            position: relative;
            top: 0.5px;
            left: 1px;
        }
        .last a:hover{
            color: white;
        }






        @media(max-width:768px){
            body{
            background-color: white;
            background-image: url(background\ image.jpg);
            background-repeat: no-repeat;
            background-size: 780px 550px;
            overflow: hidden;
            }

            .contact-container{
                width: 550px;
                margin-top: -10px;
            }

        }

         @media(max-width:480px){
            body{ 
            
            background-image: url(background\ image.jpg);
            background-repeat: no-repeat;
            background-size: 440px 550px;
            
            }

             .contact-container{
                width: 250px;
                margin-top: -10px;
            } 

             .form-group input{
            width: 100%;
            height: 30px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 10px;
            background-color: rgb(248, 248, 248);
             }

            .contact-container h1{
            text-align: center;
            margin-bottom: 20px;
            font-size: 25px;
            color: white;
            font-weight: 700;
        }

        .contact-container p{
            font-size: small;
        }


        }
         

        
        



    </style>
</head>
<body>
    <section class="contact-section">
        <div class ="contact-container">
            <h1>Welcome Back!!</h1>
            <p>Login your Account</p>

            <form action="index.html" method="post">
               
                <div class="form-group">
                    <label for="#">E-mail</label>
                    <input type="email" name="email" placeholder="Enter your email address" required>
                </div>
                 <div class="form-group">
                    <label for="#">password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                 <div class="button-wrapper">
            <button type="submit">Login</button>
             </div>
            <p class="last">Don't have an Account<a href="register.html">Sign up</a></p>

        </div>
                 

            </form>
            <!-- <button class="btn">Sign Up</button>// -->
            
           
        
    </section>
    
</body>
</html>
